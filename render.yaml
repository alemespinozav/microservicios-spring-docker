services:

  # =========================================================
  # 1. SERVIDOR EUREKA
  # =========================================================
  - type: web
    name: eureka-server
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: eureka-server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "8761"

  # =========================================================
  # 2. MICROSERVICIO DE PRODUCTOS
  # =========================================================
  - type: web
    name: producto-service
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: producto-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "8081"
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_HOSTPORT
        fromService:
          type: web
          name: eureka-server
          property: hostport

  # =========================================================
  # 3. MICROSERVICIO DE USUARIOS
  # =========================================================
  - type: web
    name: usuario-service
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: usuario-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "8082"
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_HOSTPORT
        fromService:
          type: web
          name: eureka-server
          property: hostport

  # =========================================================
  # 4. API GATEWAY
  # =========================================================
  - type: web
    name: gateway-service
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: gateway-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "8083"
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_HOSTPORT
        fromService:
          type: web
          name: eureka-server
          property: hostport