spring.application.name=producto-service

server.port=${PORT:8081}

eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_ENABLED:false}
eureka.client.fetch-registry=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port=443
eureka.instance.home-page-url=https://${RENDER_EXTERNAL_HOSTNAME:localhost}/
eureka.instance.status-page-url=https://${RENDER_EXTERNAL_HOSTNAME:localhost}/
eureka.instance.health-check-url=https://${RENDER_EXTERNAL_HOSTNAME:localhost}/